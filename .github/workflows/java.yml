name: Java CI

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '.github/workflows/doc.yml'
      - '.github/workflows/license_update.yml'
      - '.github/workflows/version_update.yml'
      - 'ci/doc/**'
      - 'create.sh'
      - 'LICENSE'
      - 'README.md'
  workflow_dispatch: # allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Checkout submodules
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          path: advent-of-code-inputs
          repository: zodac-personal/advent-of-code-inputs
          token: ${{ secrets.SUBMODULE_ACCESS }}

      - name: Cache local .m2
        uses: actions/cache@v5.0.5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Setup Maven Action
        uses: s4u/setup-maven-action@v1.20.0
        with:
          checkout-fetch-depth: 0
          java-distribution: 'temurin'
          java-version: '26'
          maven-version: '3.9.15'

      - name: Run lints and test with Maven (including SonarQube)
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONARQUBE_PAT: ${{ secrets.SONARQUBE_PAT }}
        run: mvn clean install -Dall -Dsonarqube -T 2C
